version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_APP_NAME=Bruce
      - NEXT_PUBLIC_API_URL=http://backend:8080/api
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - GOOGLE_CLOUD_PROJECT=bruce-499005
      - GEMINI_MODEL=gemini-3.5-flash
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DYNATRACE_ENV_URL=${DYNATRACE_ENV_URL}
      - DYNATRACE_API_TOKEN=${DYNATRACE_API_TOKEN}
      - FIRESTORE_DATABASE=(default)

  mcp-server:
    build:
      context: .
      dockerfile: mcp-server/Dockerfile
    environment:
      - DYNATRACE_ENV_URL=${DYNATRACE_ENV_URL}
      - DYNATRACE_API_TOKEN=${DYNATRACE_API_TOKEN}

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./infra/bindplane/pipeline.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    environment:
      - DYNATRACE_ENV_URL=${DYNATRACE_ENV_URL}
      - DYNATRACE_API_TOKEN=${DYNATRACE_API_TOKEN}
